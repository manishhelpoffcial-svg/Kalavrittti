kind = "web"
previewPath = "/"
title = "Kalavritti — Celebrating Handmade"
version = "1.0.0"
id = "artifacts/kalavritti"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26070

[services.development]
run = "pnpm --filter @workspace/kalavritti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kalavritti", "run", "build" ]
publicDir = "artifacts/kalavritti/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26070"
BASE_PATH = "/"
